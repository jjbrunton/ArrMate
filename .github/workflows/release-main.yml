name: Release Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release for main
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Compute main release metadata
        id: release
        run: |
          PACKAGE_VERSION=$(node -p 'require("./package.json").version')
          COMMIT_EPOCH=$(git show -s --format=%ct "${GITHUB_SHA}")
          APP_VERSION="${PACKAGE_VERSION}-main.${COMMIT_EPOCH}"
          RELEASE_TAG="v${APP_VERSION}"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          name: Main build ${{ steps.release.outputs.release_tag }} (${{ steps.release.outputs.short_sha }})
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
